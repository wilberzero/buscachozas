name: Scraper Diario de Pisos

on:
  schedule:
    # Se ejecuta todos los días a las 08:00 AM (UTC)
    - cron: '0 8 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente si lo necesitas

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install curl_cffi bs4 supabase

    - name: Ejecutar Scraper
      run: python buscapisos_v3_supabase.py
      # Las credenciales están en el script, pero si en el futuro las pones como variables de entorno, se leerían aquí.
